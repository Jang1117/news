<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키워드 뉴스 검색</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ── 다크 테마 ── */
        [data-theme="dark"] {
            --bg: #0e0e10;
            --surface: #18181c;
            --border: #2a2a32;
            --accent: #e8ff47;
            --accent2: #47c5ff;
            --text: #f0f0f0;
            --muted: #888;
            --card-bg: #14141a;
            --history-bg: #1c1c22;
            --history-item: #22222a;
            --history-hover: #2a2a36;
            --shadow: rgba(0,0,0,0.4);
            --card-hover-border: rgba(232,255,71,0.35);
        }

        /* ── 라이트 테마 ── */
        [data-theme="light"] {
            --bg: #f5f5f0;
            --surface: #ffffff;
            --border: #e0e0d8;
            --accent: #2563eb;
            --accent2: #0891b2;
            --text: #1a1a1a;
            --muted: #888;
            --card-bg: #ffffff;
            --history-bg: #f0f0ea;
            --history-item: #e8e8e0;
            --history-hover: #dcdcd4;
            --shadow: rgba(0,0,0,0.08);
            --card-hover-border: rgba(37,99,235,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Serif KR', serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 0 80px 0;
            transition: background 0.3s, color 0.3s;
        }

        /* ── 헤더 ── */
        header {
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            display: flex; align-items: center; gap: 14px;
            background: var(--surface);
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 12px var(--shadow);
        }
        .logo-mark {
            width: 34px; height: 34px; background: var(--accent);
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700;
            color: #000; flex-shrink: 0;
        }
        header h1 {
            font-family: 'Space Mono', monospace; font-size: 18px;
            letter-spacing: -0.5px; color: var(--text); flex: 1;
        }
        header h1 span { color: var(--accent); }

        /* 테마 토글 버튼 */
        .theme-btn {
            background: var(--history-item); border: 1px solid var(--border);
            border-radius: 8px; padding: 7px 14px; cursor: pointer;
            font-family: 'Space Mono', monospace; font-size: 12px;
            color: var(--text); transition: background 0.15s;
            white-space: nowrap;
        }
        .theme-btn:hover { background: var(--history-hover); }

        /* ── 검색 영역 ── */
        .search-wrap { max-width: 760px; margin: 48px auto 12px; padding: 0 24px; }
        .search-label {
            font-family: 'Space Mono', monospace; font-size: 11px;
            letter-spacing: 3px; text-transform: uppercase;
            color: var(--muted); margin-bottom: 12px;
        }
        .search-row {
            display: flex; border: 1.5px solid var(--border);
            border-radius: 10px; overflow: hidden;
            background: var(--surface); transition: border-color 0.2s;
            box-shadow: 0 2px 8px var(--shadow);
        }
        .search-row:focus-within { border-color: var(--accent); }
        .search-row input {
            flex: 1; background: transparent; border: none; outline: none;
            padding: 15px 20px; font-size: 16px;
            font-family: 'Noto Serif KR', serif; color: var(--text);
        }
        .search-row input::placeholder { color: var(--muted); }
        .search-row button {
            background: var(--accent); border: none; padding: 0 26px; cursor: pointer;
            font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
            color: #000; letter-spacing: 1px; transition: opacity 0.15s; white-space: nowrap;
        }
        .search-row button:hover { opacity: 0.85; }
        .search-row button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── 검색 기록 ── */
        .history-wrap {
            max-width: 760px; margin: 14px auto 36px; padding: 0 24px;
        }
        .history-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px;
        }
        .history-label {
            font-family: 'Space Mono', monospace; font-size: 10px;
            letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
        }
        .history-actions { display: flex; gap: 8px; }
        .history-btn {
            font-family: 'Space Mono', monospace; font-size: 10px;
            background: none; border: 1px solid var(--border);
            border-radius: 5px; padding: 3px 10px; cursor: pointer;
            color: var(--muted); transition: color 0.15s, border-color 0.15s;
        }
        .history-btn:hover { color: var(--text); border-color: var(--text); }
        .history-btn.export { color: var(--accent2); border-color: var(--accent2); }
        .history-btn.export:hover { background: rgba(71,197,255,0.08); }

        .history-list {
            display: flex; flex-wrap: wrap; gap: 8px;
        }
        .history-chip {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--history-item); border: 1px solid var(--border);
            border-radius: 20px; padding: 5px 12px;
            font-family: 'Space Mono', monospace; font-size: 12px;
            color: var(--text); cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        .history-chip:hover { background: var(--history-hover); border-color: var(--accent); }
        .history-chip .chip-text { color: var(--text); }
        .history-chip .chip-count {
            font-size: 10px; color: var(--muted);
            background: var(--history-bg); border-radius: 10px; padding: 1px 6px;
        }
        .history-chip .chip-del {
            font-size: 14px; color: var(--muted); line-height: 1;
            transition: color 0.15s;
        }
        .history-chip .chip-del:hover { color: #ff6060; }

        /* ── 상태바 ── */
        .status-bar {
            max-width: 760px; margin: 0 auto 24px; padding: 0 24px;
            font-family: 'Space Mono', monospace; font-size: 12px;
            color: var(--muted); min-height: 18px;
        }
        .keyword-tag {
            display: inline-block; border-radius: 4px;
            padding: 2px 8px; font-size: 12px; margin-left: 6px;
            background: rgba(232,255,71,0.12); color: var(--accent);
            border: 1px solid rgba(232,255,71,0.3);
        }
        [data-theme="light"] .keyword-tag {
            background: rgba(37,99,235,0.1); color: var(--accent);
            border-color: rgba(37,99,235,0.3);
        }

        /* ── 뉴스 그리드 ── */
        .news-grid {
            max-width: 1100px; margin: 0 auto; padding: 0 24px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px;
        }
        .news-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            display: flex; flex-direction: column;
            cursor: pointer;
            box-shadow: 0 2px 8px var(--shadow);
        }
        .news-card:hover {
            transform: translateY(-4px);
            border-color: var(--card-hover-border);
            box-shadow: 0 8px 24px var(--shadow);
        }
        .card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .card-source {
            font-family: 'Space Mono', monospace; font-size: 10px;
            letter-spacing: 2px; text-transform: uppercase; color: var(--accent2);
        }
        .card-title { font-size: 15px; font-weight: 700; line-height: 1.55; color: var(--text); }
        .card-desc { font-size: 13px; color: var(--muted); line-height: 1.6; flex: 1; }
        .card-footer {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
        }
        .card-date { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
        .card-link {
            font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent);
            text-decoration: none; border: 1px solid rgba(232,255,71,0.3);
            padding: 3px 10px; border-radius: 4px; transition: background 0.15s;
        }
        [data-theme="light"] .card-link { border-color: rgba(37,99,235,0.35); }
        .card-link:hover { background: rgba(232,255,71,0.1); }
        [data-theme="light"] .card-link:hover { background: rgba(37,99,235,0.08); }

        /* ── 상태 박스 ── */
        .state-box { max-width: 500px; margin: 80px auto; text-align: center; padding: 0 24px; }
        .state-icon { font-size: 46px; margin-bottom: 18px; }
        .state-title {
            font-family: 'Space Mono', monospace; font-size: 15px;
            color: var(--muted); margin-bottom: 8px;
        }
        .state-sub { font-size: 14px; color: var(--muted); opacity: 0.6; }

        .spinner {
            width: 38px; height: 38px; border: 3px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.7s linear infinite; margin: 0 auto 18px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-box {
            max-width: 600px; margin: 60px auto;
            background: rgba(255,80,80,0.06); border: 1px solid rgba(255,80,80,0.22);
            border-radius: 12px; padding: 26px 30px; font-size: 13px;
            line-height: 1.8; color: #ff9090; font-family: 'Space Mono', monospace;
        }
        .error-box strong { color: #ff6060; display: block; margin-bottom: 8px; }
    </style>
</head>
<body>

<header>
    <div class="logo-mark">N</div>
    <h1>NAVER <span>NEWS</span> SEARCH</h1>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀ 라이트</button>
</header>

<div class="search-wrap">
    <div class="search-label">키워드 입력</div>
    <div class="search-row">
        <input type="text" id="keyword" placeholder="검색할 키워드 (예: AI, 삼성전자, 기후변화)">
        <button id="searchBtn" onclick="searchNews()">검색</button>
    </div>
</div>

<div class="history-wrap" id="historyWrap" style="display:none">
    <div class="history-header">
        <span class="history-label">검색 기록</span>
        <div class="history-actions">
            <button class="history-btn export" onclick="exportJSON()">JSON 저장</button>
            <button class="history-btn" onclick="clearHistory()">전체 삭제</button>
        </div>
    </div>
    <div class="history-list" id="historyList"></div>
</div>

<div class="status-bar" id="statusBar"></div>
<div id="results"></div>

<script>
    // ─── 프록시 주소 ───────────────────────────────────────────
    const PROXY = "https://jackets-agrees-thought-contributed.trycloudflare.com";
    // ──────────────────────────────────────────────────────────

    const STORAGE_KEY = "news_keyword_history";
    const btn         = document.getElementById('searchBtn');
    const statusBar   = document.getElementById('statusBar');
    const resultsDiv  = document.getElementById('results');

    // ── 테마 관리 ──────────────────────────────────────────────
    let currentTheme = localStorage.getItem('news_theme') || 'dark';
    applyTheme(currentTheme);

    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀ 라이트' : '🌙 다크';
        currentTheme = theme;
        localStorage.setItem('news_theme', theme);
    }

    function toggleTheme() {
        applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
    }

    // ── 검색 기록 관리 ─────────────────────────────────────────
    function loadHistory() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch { return []; }
    }

    function saveHistory(history) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    function addToHistory(keyword) {
        let history = loadHistory();
        const existing = history.find(h => h.keyword === keyword);
        if (existing) {
            existing.count++;
            existing.lastSearched = new Date().toISOString();
        } else {
            history.unshift({ keyword, count: 1, lastSearched: new Date().toISOString() });
        }
        // 최대 30개 유지
        if (history.length > 30) history = history.slice(0, 30);
        saveHistory(history);
        renderHistory();
    }

    function removeFromHistory(keyword) {
        const history = loadHistory().filter(h => h.keyword !== keyword);
        saveHistory(history);
        renderHistory();
    }

    function clearHistory() {
        if (!confirm("검색 기록을 모두 삭제할까요?")) return;
        localStorage.removeItem(STORAGE_KEY);
        renderHistory();
    }

    function exportJSON() {
        const history = loadHistory();
        if (!history.length) { alert("저장된 검색 기록이 없습니다."); return; }
        const blob = new Blob([JSON.stringify(history, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `news_keywords_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    function renderHistory() {
        const history = loadHistory();
        const wrap = document.getElementById('historyWrap');
        const list = document.getElementById('historyList');

        if (!history.length) { wrap.style.display = 'none'; return; }
        wrap.style.display = 'block';

        list.innerHTML = history.map(h => `
            <div class="history-chip" onclick="clickChip('${h.keyword.replace(/'/g, "\\'")}')">
                <span class="chip-text">${h.keyword}</span>
                <span class="chip-count">${h.count}</span>
                <span class="chip-del" onclick="event.stopPropagation(); removeFromHistory('${h.keyword.replace(/'/g, "\\'")}')">×</span>
            </div>
        `).join('');
    }

    function clickChip(keyword) {
        document.getElementById('keyword').value = keyword;
        searchNews();
    }

    // ── 검색 ───────────────────────────────────────────────────
    async function searchNews() {
        const keyword = document.getElementById('keyword').value.trim();
        if (!keyword) { alert("키워드를 입력해주세요!"); return; }

        btn.disabled = true;
        btn.textContent = '검색 중…';
        statusBar.innerHTML = '';
        resultsDiv.innerHTML = `
            <div class="state-box">
                <div class="spinner"></div>
                <div class="state-title">뉴스를 가져오는 중입니다</div>
            </div>`;

        try {
            const url = `${PROXY}/news?query=${encodeURIComponent(keyword)}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`서버 응답 오류: ${res.status}`);

            const data  = await res.json();
            const items = data.items || [];

            // 성공 시 기록 저장
            addToHistory(keyword);
            renderNews(items, keyword);

        } catch (err) {
            resultsDiv.innerHTML = `
                <div class="error-box">
                    <strong>⚠ 오류가 발생했습니다</strong>
                    ${err.message}<br><br>
                    <span style="opacity:0.6">
                        • Mini PC의 server.js가 실행 중인지 확인하세요.<br>
                        • Cloudflare 터널이 열려 있는지 확인하세요.
                    </span>
                </div>`;
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.textContent = '검색';
        }
    }

    // ── 뉴스 렌더링 ────────────────────────────────────────────
    function renderNews(items, keyword) {
        if (!items.length) {
            resultsDiv.innerHTML = `
                <div class="state-box">
                    <div class="state-icon">🔎</div>
                    <div class="state-title">검색 결과가 없습니다</div>
                    <div class="state-sub">다른 키워드로 시도해보세요</div>
                </div>`;
            statusBar.innerHTML = `키워드 <span class="keyword-tag">${keyword}</span> — 결과 없음`;
            return;
        }

        statusBar.innerHTML = `키워드 <span class="keyword-tag">${keyword}</span> — ${items.length}건 검색됨`;

        const cards = items.map(item => {
            const title = (item.title || '').replace(/<\/?b>/g, '');
            const desc  = (item.description || '').replace(/<\/?b>/g, '');
            const date  = item.pubDate
                ? new Date(item.pubDate).toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
                : '';
            const link  = item.link || item.originallink || '#';
            let source  = '';
            try { source = new URL(link).hostname.replace('www.', ''); } catch {}

            return `
            <div class="news-card" onclick="window.open('${link}', '_blank', 'noopener')">
                <div class="card-body">
                    ${source ? `<div class="card-source">${source}</div>` : ''}
                    <div class="card-title">${title}</div>
                    ${desc ? `<div class="card-desc">${desc}</div>` : ''}
                    <div class="card-footer">
                        <span class="card-date">${date}</span>
                        <a href="${link}" target="_blank" rel="noopener" class="card-link"
                           onclick="event.stopPropagation()">기사 보기 →</a>
                    </div>
                </div>
            </div>`;
        }).join('');

        resultsDiv.innerHTML = `<div class="news-grid">${cards}</div>`;
    }

    // ── 초기화 ─────────────────────────────────────────────────
    document.getElementById('keyword').addEventListener('keypress', e => {
        if (e.key === 'Enter') searchNews();
    });

    renderHistory();
</script>
</body>
</html>
