<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키워드 뉴스 검색</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e10;
            --surface: #18181c;
            --border: #2a2a32;
            --accent: #e8ff47;
            --accent2: #47c5ff;
            --text: #f0f0f0;
            --muted: #888;
            --card-bg: #14141a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Serif KR', serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 0 60px 0;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 28px 40px;
            display: flex; align-items: center; gap: 16px;
            background: var(--surface);
        }
        header .logo-mark {
            width: 36px; height: 36px; background: var(--accent);
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: #000;
        }
        header h1 { font-family: 'Space Mono', monospace; font-size: 20px; letter-spacing: -0.5px; }
        header h1 span { color: var(--accent); }

        .search-wrap { max-width: 760px; margin: 60px auto 50px; padding: 0 24px; }
        .search-label {
            font-family: 'Space Mono', monospace; font-size: 11px;
            letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
        }
        .search-row {
            display: flex; border: 1.5px solid var(--border);
            border-radius: 10px; overflow: hidden;
            background: var(--surface); transition: border-color 0.2s;
        }
        .search-row:focus-within { border-color: var(--accent); }
        .search-row input {
            flex: 1; background: transparent; border: none; outline: none;
            padding: 16px 20px; font-size: 17px; font-family: 'Noto Serif KR', serif; color: var(--text);
        }
        .search-row input::placeholder { color: var(--muted); }
        .search-row button {
            background: var(--accent); border: none; padding: 0 28px; cursor: pointer;
            font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
            color: #000; letter-spacing: 1px; transition: background 0.15s; white-space: nowrap;
        }
        .search-row button:hover { background: #d4eb30; }
        .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-bar {
            max-width: 760px; margin: 0 auto 30px; padding: 0 24px;
            font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); min-height: 20px;
        }
        .keyword-tag {
            display: inline-block; background: rgba(232,255,71,0.12); color: var(--accent);
            border: 1px solid rgba(232,255,71,0.3); border-radius: 4px;
            padding: 2px 8px; font-size: 12px; margin-left: 6px;
        }

        .news-grid {
            max-width: 1100px; margin: 0 auto; padding: 0 24px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;
        }
        .news-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden;
            transition: transform 0.2s, border-color 0.2s; display: flex; flex-direction: column;
        }
        .news-card:hover { transform: translateY(-4px); border-color: rgba(232,255,71,0.35); }
        .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .card-source {
            font-family: 'Space Mono', monospace; font-size: 10px;
            letter-spacing: 2px; text-transform: uppercase; color: var(--accent2);
        }
        .card-title { font-size: 16px; font-weight: 700; line-height: 1.5; }
        .card-title a { color: var(--text); text-decoration: none; }
        .card-title a:hover { color: var(--accent); }
        .card-desc { font-size: 13px; color: #aaa; line-height: 1.6; flex: 1; }
        .card-footer {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
        }
        .card-date { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
        .card-link {
            font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent);
            text-decoration: none; border: 1px solid rgba(232,255,71,0.3);
            padding: 3px 10px; border-radius: 4px; transition: background 0.15s;
        }
        .card-link:hover { background: rgba(232,255,71,0.1); }

        .state-box { max-width: 500px; margin: 80px auto; text-align: center; padding: 0 24px; }
        .state-icon { font-size: 48px; margin-bottom: 20px; }
        .state-title { font-family: 'Space Mono', monospace; font-size: 16px; color: var(--muted); margin-bottom: 8px; }
        .state-sub { font-size: 14px; color: #555; }

        .spinner {
            width: 40px; height: 40px; border: 3px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.7s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-box {
            max-width: 600px; margin: 60px auto;
            background: rgba(255,80,80,0.07); border: 1px solid rgba(255,80,80,0.25);
            border-radius: 12px; padding: 28px 32px; font-size: 14px;
            line-height: 1.7; color: #ff9090; font-family: 'Space Mono', monospace;
        }
        .error-box strong { color: #ff6060; display: block; margin-bottom: 8px; font-size: 15px; }
    </style>
</head>
<body>

<header>
    <div class="logo-mark">N</div>
    <h1>NAVER <span>NEWS</span> SEARCH</h1>
</header>

<div class="search-wrap">
    <div class="search-label">키워드 입력</div>
    <div class="search-row">
        <input type="text" id="keyword" placeholder="검색할 키워드 (예: AI, 삼성전자, 기후변화)">
        <button id="searchBtn" onclick="searchNews()">검색</button>
    </div>
</div>

<div class="status-bar" id="statusBar"></div>
<div id="results"></div>

<script>
    // ─── Mini PC 프록시 주소 ───────────────────────────────────
    // Cloudflare Tunnel 또는 ngrok 주소로 변경하세요
    const PROXY = "https://jackets-agrees-thought-contributed.trycloudflare.com";
    // ──────────────────────────────────────────────────────────

    const btn        = document.getElementById('searchBtn');
    const statusBar  = document.getElementById('statusBar');
    const resultsDiv = document.getElementById('results');

    async function searchNews() {
        const keyword = document.getElementById('keyword').value.trim();
        if (!keyword) { alert("키워드를 입력해주세요!"); return; }

        btn.disabled = true;
        btn.textContent = '검색 중…';
        statusBar.innerHTML = '';
        resultsDiv.innerHTML = `
            <div class="state-box">
                <div class="spinner"></div>
                <div class="state-title">뉴스를 가져오는 중입니다</div>
            </div>`;

        try {
            const url = `${PROXY}/news?query=${encodeURIComponent(keyword)}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`서버 응답 오류: ${res.status}`);

            const data  = await res.json();
            const items = data.items || [];
            renderNews(items, keyword);

        } catch (err) {
            resultsDiv.innerHTML = `
                <div class="error-box">
                    <strong>⚠ 오류가 발생했습니다</strong>
                    ${err.message}<br><br>
                    <span style="color:#777">
                        • Mini PC의 server.js가 실행 중인지 확인하세요.<br>
                        • Cloudflare 터널이 열려 있는지 확인하세요.<br>
                        • PROXY 주소가 올바른지 확인하세요.
                    </span>
                </div>`;
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.textContent = '검색';
        }
    }

    function renderNews(items, keyword) {
        if (!items.length) {
            resultsDiv.innerHTML = `
                <div class="state-box">
                    <div class="state-icon">🔎</div>
                    <div class="state-title">검색 결과가 없습니다</div>
                    <div class="state-sub">다른 키워드로 시도해보세요</div>
                </div>`;
            statusBar.innerHTML = `키워드 <span class="keyword-tag">${keyword}</span> — 결과 없음`;
            return;
        }

        statusBar.innerHTML = `키워드 <span class="keyword-tag">${keyword}</span> — ${items.length}건 검색됨`;

        const cards = items.map(item => {
            const title = (item.title || '').replace(/<\/?b>/g, '');
            const desc  = (item.description || '').replace(/<\/?b>/g, '');
            const date  = item.pubDate
                ? new Date(item.pubDate).toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
                : '';
            const link  = item.link || item.originallink || '#';
            let source  = '';
            try { source = new URL(link).hostname.replace('www.', ''); } catch {}

            return `
            <div class="news-card">
                <div class="card-body">
                    ${source ? `<div class="card-source">${source}</div>` : ''}
                    <div class="card-title"><a href="${link}" target="_blank" rel="noopener">${title}</a></div>
                    ${desc ? `<div class="card-desc">${desc}</div>` : ''}
                    <div class="card-footer">
                        <span class="card-date">${date}</span>
                        <a href="${link}" target="_blank" rel="noopener" class="card-link">기사 보기 →</a>
                    </div>
                </div>
            </div>`;
        }).join('');

        resultsDiv.innerHTML = `<div class="news-grid">${cards}</div>`;
    }

    document.getElementById('keyword').addEventListener('keypress', e => {
        if (e.key === 'Enter') searchNews();
    });
</script>
</body>
</html>
