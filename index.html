<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키워드 뉴스 검색</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ══ 테마 ══════════════════════════════════════════════════ */
        [data-theme="dark"] {
            --bg:        #111114;
            --surface:   #1c1c20;
            --surface2:  #242428;
            --border:    #32323a;
            --accent:    #d4ff00;
            --accent2:   #38bdf8;
            --text:      #eeeef0;
            --text-sub:  #b0b0bc;
            --muted:     #70707a;
            --card-bg:   #1c1c20;
            --chip-bg:   #28282e;
            --chip-hov:  #33333b;
            --shadow:    rgba(0,0,0,.5);
        }
        [data-theme="light"] {
            --bg:        #f2f2ef;
            --surface:   #ffffff;
            --surface2:  #f7f7f4;
            --border:    #ddddd8;
            --accent:    #1d4ed8;
            --accent2:   #0284c7;
            --text:      #111118;
            --text-sub:  #44444e;
            --muted:     #88888e;
            --card-bg:   #ffffff;
            --chip-bg:   #eaeae6;
            --chip-hov:  #dededb;
            --shadow:    rgba(0,0,0,.06);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; transition: background .25s, color .25s;
        }

        /* ══ 플로팅 패널 ════════════════════════════════════════════ */
        .floating-panel {
            position: fixed; top: 0; left: 0; right: 0; z-index: 300;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 16px var(--shadow);
        }

        /* 상단 바 */
        .top-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 20px;
            border-bottom: 1px solid var(--border);
        }
        .logo-mark {
            width: 28px; height: 28px; background: var(--accent);
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            font-family: 'Space Mono', monospace; font-weight: 700; font-size: 13px;
            color: #000; flex-shrink: 0;
        }
        .top-bar h1 {
            font-family: 'Space Mono', monospace; font-size: 13px;
            font-weight: 700; color: var(--text); white-space: nowrap; flex-shrink: 0;
        }
        .top-bar h1 span { color: var(--accent); }

        /* 구분선 */
        .bar-divider {
            width: 1px; height: 20px; background: var(--border); flex-shrink: 0;
        }

        /* 소스+기간 묶음 */
        .btn-group {
            display: flex; align-items: center; gap: 0; flex: 1;
        }

        /* 소스 그룹 */
        .source-group { display: flex; flex-wrap: wrap; gap: 6px; }

        /* 기간 그룹 — 소스에서 16px만 띄움 */
        .period-group { display: flex; gap: 6px; margin-left: 16px; }

        /* ── 소스 버튼 (개별 둥근 스타일 유지) ── */
        .src-label {
            display: inline-flex; align-items: center; gap: 6px;
            height: 30px; padding: 0 13px; border-radius: 7px;
            border: 1.5px solid var(--border); background: var(--surface2);
            cursor: pointer; user-select: none;
            font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
            color: var(--text-sub); transition: border-color .15s, background .15s, color .15s;
            white-space: nowrap;
        }
        .src-label input[type="checkbox"] { display: none; }
        .src-label .dot {
            width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; opacity: .4;
            transition: opacity .15s;
        }
        .src-label.checked { border-color: var(--accent); background: var(--surface); color: var(--text); }
        .src-label.checked .dot { opacity: 1; }
        .src-label:hover:not(.checked) { border-color: var(--muted); color: var(--text); }

        /* ── 기간 버튼 (소스 버튼과 크기 동일) ── */
        .period-btn {
            height: 30px; padding: 0 13px; border-radius: 7px;
            border: 1.5px solid var(--border); background: var(--surface2);
            cursor: pointer; font-family: 'Space Mono', monospace;
            font-size: 11px; font-weight: 700; color: var(--text-sub);
            transition: border-color .15s, background .15s, color .15s;
            white-space: nowrap;
        }
        .period-btn.active { border-color: var(--accent2); color: var(--accent2); background: var(--surface); }
        .period-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

        .theme-btn {
            background: var(--chip-bg); border: 1px solid var(--border);
            border-radius: 7px; height: 30px; padding: 0 13px; cursor: pointer;
            font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
            color: var(--text); transition: background .15s; white-space: nowrap; flex-shrink: 0;
        }
        .theme-btn:hover { background: var(--chip-hov); }
        .excel-all-btn {
            height: 30px; padding: 0 13px; border-radius: 7px;
            border: 1.5px solid #22c55e; background: rgba(34,197,94,.08);
            cursor: pointer; font-family: 'Space Mono', monospace;
            font-size: 11px; font-weight: 700; color: #22c55e;
            transition: background .15s; white-space: nowrap; flex-shrink: 0;
        }
        .excel-all-btn:hover { background: rgba(34,197,94,.18); }
        .excel-all-btn:disabled { opacity: .35; cursor: not-allowed; }

        /* 검색창 바 */
        .search-bar {
            padding: 10px 20px;
        }
        .search-row {
            display: flex; border: 1.5px solid var(--border); border-radius: 9px;
            overflow: hidden; background: var(--surface2);
            transition: border-color .2s;
        }
        .search-row:focus-within { border-color: var(--accent); background: var(--surface); }
        .search-row input {
            flex: 1; background: transparent; border: none; outline: none;
            padding: 11px 18px; font-size: 15px; font-weight: 500;
            font-family: 'Noto Sans KR', sans-serif; color: var(--text);
        }
        .search-row input::placeholder { color: var(--muted); font-weight: 400; }
        .search-row button {
            background: var(--accent); border: none; padding: 0 24px; cursor: pointer;
            font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
            color: #000; transition: opacity .15s; white-space: nowrap;
        }
        .search-row button:hover { opacity: .85; }
        .search-row button:disabled { opacity: .35; cursor: not-allowed; }

        /* 검색 기록 바 */
        .history-bar {
            padding: 0 20px 10px;
            border-top: 1px solid var(--border);
        }
        .history-bar-inner {
            display: flex; align-items: flex-start; gap: 10px; padding-top: 8px;
        }
        .history-label {
            font-family: 'Space Mono', monospace; font-size: 9px;
            letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
            padding-top: 6px; white-space: nowrap; flex-shrink: 0;
        }
        .history-list { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
        .h-chip {
            display: inline-flex; align-items: center; gap: 4px;
            background: var(--chip-bg); border: 1px solid var(--border);
            border-radius: 20px; padding: 4px 8px 4px 12px;
            font-size: 12px; font-weight: 500; color: var(--text);
            cursor: pointer; transition: background .15s, border-color .15s; user-select: none;
        }
        .h-chip:hover { background: var(--chip-hov); border-color: var(--accent); }
        .h-chip .del { font-size: 14px; line-height: 1; color: var(--muted); transition: color .15s; }
        .h-chip .del:hover { color: #f87171; }
        .history-actions { display: flex; gap: 6px; align-items: flex-start; padding-top: 4px; flex-shrink: 0; }
        .hbtn {
            font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700;
            background: none; border: 1px solid var(--border); border-radius: 5px;
            padding: 3px 9px; cursor: pointer; color: var(--muted);
            transition: color .15s, border-color .15s, background .15s; white-space: nowrap;
        }
        .hbtn:hover { color: var(--text); border-color: var(--muted); }
        .hbtn.export { color: var(--accent2); border-color: var(--accent2); }
        .hbtn.export:hover { background: rgba(56,189,248,.08); }
        .excel-btn {
            display: inline-flex; align-items: center; gap: 5px;
            height: 28px; padding: 0 12px; border-radius: 6px;
            border: 1.5px solid #22c55e; background: rgba(34,197,94,.08);
            cursor: pointer; font-family: 'Space Mono', monospace;
            font-size: 11px; font-weight: 700; color: #22c55e;
            transition: background .15s; white-space: nowrap;
        }
        .excel-btn:hover { background: rgba(34,197,94,.18); }
        .excel-btn:disabled { opacity: .4; cursor: not-allowed; }

        /* ══ 결과 레이아웃 ═══════════════════════════════════════════ */
        /* 플로팅 패널 높이만큼 body에 패딩 (JS로 동적 설정) */
        #resultsArea {
            display: flex; align-items: stretch;
            min-height: calc(100vh - 200px);
            border-top: 1px solid var(--border);
        }
        .results-area {
            display: flex; align-items: stretch;
            min-height: calc(100vh - 200px);
            border-top: 1px solid var(--border);
        }
        .results-area.single { display: block; }

        .pane {
            flex: 1; min-width: 0;
            display: flex; flex-direction: column;
        }
        .pane + .pane { border-left: 2px solid var(--border); }

        /* 패널 헤더 (다중일 때만) */
        .pane-header {
            position: sticky; top: var(--panel-h, 120px); z-index: 100;
            background: var(--surface2); border-bottom: 1px solid var(--border);
            padding: 9px 18px; display: flex; align-items: center; gap: 9px;
        }
        .pane-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .pane-title { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: var(--text-sub); flex: 1; }
        .pane-count { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); flex: 1; }

        .pane-body { padding: 16px; overflow-y: auto; }

        /* ══ 카드 ═══════════════════════════════════════════════════ */
        .card-list { display: flex; flex-direction: column; gap: 11px; }
        .news-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 10px; padding: 15px; cursor: pointer;
            transition: border-color .18s, box-shadow .18s, transform .15s;
            box-shadow: 0 1px 4px var(--shadow);
        }
        .news-card:hover {
            border-color: var(--accent); transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--shadow);
        }
        .card-src-badge {
            display: inline-block; font-family: 'Space Mono', monospace; font-size: 9px;
            font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
            padding: 2px 7px; border-radius: 4px; margin-bottom: 8px;
        }
        .card-title {
            font-size: 14px; font-weight: 700; line-height: 1.6;
            color: var(--text); margin-bottom: 7px;
        }
        .card-desc {
            font-size: 13px; font-weight: 400;
            color: var(--text-sub); line-height: 1.65; margin-bottom: 11px;
        }
        .card-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 9px; border-top: 1px solid var(--border);
        }
        .card-date { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
        .card-open {
            font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
            color: var(--accent); text-decoration: none;
            border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
            padding: 3px 10px; border-radius: 4px; transition: background .15s;
        }
        .card-open:hover { background: color-mix(in srgb, var(--accent) 10%, transparent); }

        /* ══ 상태 박스 ══════════════════════════════════════════════ */
        .state-box { padding: 56px 20px; text-align: center; }
        .state-icon { font-size: 38px; margin-bottom: 12px; }
        .state-title { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--muted); margin-bottom: 5px; }
        .state-sub { font-size: 12px; color: var(--muted); opacity: .6; }
        .spinner {
            width: 34px; height: 34px; border: 3px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin .7s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg {
            background: rgba(248,113,113,.07); border: 1px solid rgba(248,113,113,.22);
            border-radius: 10px; padding: 16px 20px; margin: 14px;
            font-size: 12px; line-height: 1.7; color: #fca5a5;
            font-family: 'Space Mono', monospace;
        }
        .error-msg strong { color: #f87171; display: block; margin-bottom: 5px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- ══ 플로팅 패널 ══ -->
<div class="floating-panel" id="floatingPanel">

    <!-- 1행: 로고 | 소스+기간 버튼 그룹 | 테마 -->
    <div class="top-bar">
        <div class="logo-mark">N</div>
        <h1>NEWS <span>SEARCH</span></h1>

        <div class="btn-group">
            <!-- 소스 선택 -->
            <div class="source-group" id="sourceGroup"></div>

            <!-- 기간 필터 (소스에서 16px 띄움) -->
            <div class="period-group" id="periodGroup">
                <button class="period-btn"        data-days="0"   onclick="selectPeriod(this)">전체</button>
                <button class="period-btn"        data-days="1"   onclick="selectPeriod(this)">1일</button>
                <button class="period-btn active" data-days="7"   onclick="selectPeriod(this)">1주일</button>
                <button class="period-btn"        data-days="30"  onclick="selectPeriod(this)">1개월</button>
                <button class="period-btn"        data-days="365" onclick="selectPeriod(this)">1년</button>
            </div>

            <!-- 기사 수 (기간에서 16px 띄움) -->
            <div class="period-group" id="countGroup" style="margin-left:16px">
                <button class="period-btn active" data-count="20"  onclick="selectCount(this)">20</button>
                <button class="period-btn"        data-count="50"  onclick="selectCount(this)">50</button>
                <button class="period-btn"        data-count="100" onclick="selectCount(this)">100</button>
            </div>

            <!-- 중복 제거 (기사 수에서 16px 띄움) -->
            <div class="period-group" id="dedupGroup" style="margin-left:16px">
                <button class="period-btn"        data-dedup="off" onclick="selectDedup(this)">중복해제</button>
                <button class="period-btn"        data-dedup="low"  onclick="selectDedup(this)">최저</button>
                <button class="period-btn"        data-dedup="mid"  onclick="selectDedup(this)">중간</button>
                <button class="period-btn active" data-dedup="high" onclick="selectDedup(this)">최대</button>
            </div>
        </div>

        <button class="excel-all-btn" id="excelAllBtn" onclick="exportAllExcel()" disabled>⬇ 엑셀 저장</button>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀ 라이트</button>
    </div>

    <!-- 2행: 검색창 -->
    <div class="search-bar">
        <div class="search-row">
            <input type="text" id="keyword" placeholder="검색할 키워드 (예: AI, 삼성전자, 기후변화)">
            <button id="searchBtn" onclick="searchNews()">검색</button>
        </div>
    </div>

    <!-- 3행: 검색 기록 -->
    <div class="history-bar" id="historyWrap" style="display:none">
        <div class="history-bar-inner">
            <span class="history-label">기록</span>
            <div class="history-list" id="historyList"></div>
            <div class="history-actions">
                <button class="hbtn export" onclick="exportJSON()">JSON</button>
                <button class="hbtn" onclick="clearHistory()">삭제</button>
            </div>
        </div>
    </div>

</div>

<!-- 결과 -->
<div class="results-area single" id="resultsArea">
    <div class="state-box">
        <div class="state-icon">🔍</div>
        <div class="state-title">키워드를 입력하고 검색하세요</div>
    </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   설정
══════════════════════════════════════════════════════════ */
const PROXY       = "https://camera-jan-adaptor-liabilities.trycloudflare.com";
let newsDataStore = {};  // 소스별 기사 데이터 저장
const STORAGE_KEY = "news_keyword_history";

/* 소스 정의 */
const SOURCES = [
    { id: 'naver',  label: '네이버',  color: '#00c73c', type: 'naver' },
    { id: 'google',  label: '구글뉴스', color: '#4285f4', type: 'rss', filter: false,
      rss: kw => `https://news.google.com/rss/search?q=${encodeURIComponent(kw)}&hl=ko&gl=KR&ceid=KR:ko` },
    { id: 'gsearch', label: '구글검색',       color: '#34a853', type: 'gsearch' },
];

let selectedSources = new Set(['naver', 'google']); // 기본: 네이버+구글
let filterDays = 7; // 0 = 전체
let maxCount  = 20;   // 최대 기사 수
let dedupLevel = 'high'; // 중복 제거 수준: off / low / mid / high
let currentTheme = localStorage.getItem('news_theme') || 'dark';
applyTheme(currentTheme);
renderSourceGroup();

/* ── 테마 ── */
function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('themeBtn').textContent = t === 'dark' ? '☀ 라이트' : '🌙 다크';
    currentTheme = t;
    localStorage.setItem('news_theme', t);
}
function toggleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }

/* ── 소스 그룹 렌더링 ── */
function renderSourceGroup() {
    document.getElementById('sourceGroup').innerHTML = SOURCES.map(s => `
        <label class="src-label ${selectedSources.has(s.id) ? 'checked' : ''}" id="lbl-${s.id}"
               onclick="toggleSource('${s.id}')">
            <span class="dot" style="background:${s.color}"></span>
            ${s.label}
        </label>`).join('');
}

function toggleSource(id) {
    if (selectedSources.has(id)) {
        if (selectedSources.size === 1) return; // 최소 1개 유지
        selectedSources.delete(id);
    } else {
        selectedSources.add(id);
    }
    renderSourceGroup();
}

/* ── 기간 필터 ── */
function selectPeriod(btn) {
    document.querySelectorAll('#periodGroup .period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterDays = parseInt(btn.dataset.days);
}

function withinPeriod(pubDateStr) {
    if (filterDays === 0) return true;
    const pub = new Date(pubDateStr);
    if (isNaN(pub)) return true; // 날짜 파싱 실패 시 통과
    const cutoff = new Date(Date.now() - filterDays * 24 * 60 * 60 * 1000);
    return pub >= cutoff;
}

function selectDedup(btn) {
    document.querySelectorAll('#dedupGroup .period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    dedupLevel = btn.dataset.dedup;
}

function selectCount(btn) {
    document.querySelectorAll('#countGroup .period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    maxCount = parseInt(btn.dataset.count);
}

/* ══════════════════════════════════════════════════════════
   검색 기록
══════════════════════════════════════════════════════════ */
function loadHistory() {
    try {
        const raw = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        return raw.map(x => {
            if (typeof x === 'string') return x;
            if (x && typeof x === 'object' && x.keyword) return x.keyword;
            return null;
        }).filter(Boolean);
    } catch { return []; }
}
function saveHistory(h) { localStorage.setItem(STORAGE_KEY, JSON.stringify(h)); }

function addToHistory(keyword) {
    // 이미 있으면 추가하지 않음 (순서도 유지)
    let h = loadHistory();
    if (h.includes(keyword)) return;
    h.unshift(keyword);
    if (h.length > 30) h = h.slice(0, 30);
    saveHistory(h);
    renderHistory();
}
function removeFromHistory(keyword) {
    saveHistory(loadHistory().filter(x => x !== keyword));
    renderHistory();
}
function clearHistory() {
    if (!confirm("검색 기록을 모두 삭제할까요?")) return;
    localStorage.removeItem(STORAGE_KEY);
    renderHistory();
}
function exportJSON() {
    const h = loadHistory();
    if (!h.length) { alert("저장된 검색 기록이 없습니다."); return; }
    const blob = new Blob([JSON.stringify(h, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `news_keywords_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
}
function renderHistory() {
    const h    = loadHistory();
    const wrap = document.getElementById('historyWrap');
    const list = document.getElementById('historyList');
    if (!h.length) {
        wrap.style.display = 'none';
        setTimeout(adjustBodyPadding, 50);
        return;
    }
    wrap.style.display = 'block';
    setTimeout(adjustBodyPadding, 50);
    list.innerHTML = h.map(kw => {
        const safe = kw.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        return `
        <div class="h-chip" onclick="chipClick('${safe}')">
            ${kw}
            <span class="del" onclick="event.stopPropagation();removeFromHistory('${safe}')">×</span>
        </div>`;
    }).join('');
}
function chipClick(kw) {
    document.getElementById('keyword').value = kw;
    searchNews();
}

/* ══════════════════════════════════════════════════════════
   검색 메인
══════════════════════════════════════════════════════════ */
async function searchNews() {
    const keyword = document.getElementById('keyword').value.trim();
    if (!keyword) { alert("키워드를 입력해주세요!"); return; }
    newsDataStore = {};  // 이전 결과 초기화
    const excelAllBtn = document.getElementById('excelAllBtn');
    if (excelAllBtn) excelAllBtn.disabled = true;

    const btn = document.getElementById('searchBtn');
    btn.disabled = true; btn.textContent = '검색 중…';

    const area    = document.getElementById('resultsArea');
    const srcList = SOURCES.filter(s => selectedSources.has(s.id));
    const multi   = srcList.length > 1;

    // 레이아웃
    area.className = multi ? 'results-area' : 'results-area single';
    area.innerHTML = srcList.map(s => paneHTML(s, multi)).join('');

    // 병렬 fetch
    const results = await Promise.allSettled(srcList.map(s => fetchSource(s, keyword)));

    srcList.forEach((s, i) => renderPane(s, results[i], keyword, multi));

    addToHistory(keyword);
    btn.disabled = false; btn.textContent = '검색';
}

/* ── 패널 HTML ── */
function paneHTML(src, showHeader) {
    const header = `
        <div class="pane-header">
            ${showHeader ? `<span class="pane-dot" style="background:${src.color}"></span>
            <span class="pane-title">${src.label}</span>` : ''}
            <span class="pane-count" id="count-${src.id}" style="flex:1"></span>
        </div>`;
    return `
    <div class="pane" id="pane-${src.id}">
        ${header}
        <div class="pane-body" id="body-${src.id}">
            <div class="state-box"><div class="spinner"></div><div class="state-title">불러오는 중…</div></div>
        </div>
    </div>`;
}

/* ── 패널 렌더링 ── */
function renderPane(src, result, keyword, multi) {
    const body  = document.getElementById(`body-${src.id}`);
    const count = document.getElementById(`count-${src.id}`);

    if (result.status === 'rejected') {
        body.innerHTML = `<div class="error-msg"><strong>⚠ 오류</strong>${result.reason?.message || '알 수 없는 오류'}</div>`;
        return;
    }

    // 기간 필터 적용
    const beforeDedup = result.value.filter(it => withinPeriod(it.pubDate));

    // 중복 제거 적용
    const items = deduplicateItems(beforeDedup);

    if (count) {
        if (dedupLevel !== 'off' && items.length < beforeDedup.length) {
            count.textContent = `총 ${beforeDedup.length}건 → 중복제거 후 ${items.length}건`;
        } else {
            count.textContent = `총 ${items.length}건`;
        }
    }

    if (!items.length) {
        body.innerHTML = `<div class="state-box"><div class="state-icon">🔎</div><div class="state-title">결과 없음</div><div class="state-sub">${filterDays > 0 ? '기간을 늘려보세요' : '다른 키워드를 시도하세요'}</div></div>`;
        return;
    }
    body.innerHTML = `<div class="card-list">${items.map(it => cardHTML(it, src)).join('')}</div>`;

    // 엑셀 저장용 데이터 보관
    newsDataStore[src.id] = { items, label: src.label };
    // 하나라도 결과 있으면 전체 저장 버튼 활성화
    document.getElementById('excelAllBtn').disabled = false;
}

/* ── 카드 HTML ── */
function cardHTML(item, src) {
    const title = (item.title || '').replace(/<[^>]+>/g, '').trim();
    const desc  = (item.description || '').replace(/<[^>]+>/g, '').trim();
    const link  = item.link || '#';
    const date  = item.pubDate
        ? new Date(item.pubDate).toLocaleString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })
        : '';
    let domain = '';
    try { domain = new URL(link).hostname.replace('www.', ''); } catch {}

    const safeLink = link.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

    return `
    <div class="news-card" onclick="window.open('${safeLink}','_blank','noopener')">
        <div class="card-src-badge" style="background:${src.color}22;color:${src.color}">${src.label}${domain ? ' · ' + domain : ''}</div>
        <div class="card-title">${title}</div>
        ${desc ? `<div class="card-desc">${desc.slice(0, 120)}${desc.length > 120 ? '…' : ''}</div>` : ''}
        <div class="card-footer">
            <span class="card-date">${date}</span>
            <a href="${link}" target="_blank" rel="noopener" class="card-open" onclick="event.stopPropagation()">보기 →</a>
        </div>
    </div>`;
}

/* ══════════════════════════════════════════════════════════
   중복 제거 (키워드 빈도 기반)
══════════════════════════════════════════════════════════ */

// HTML 엔티티 디코딩 + 언론사 suffix 제거 + 정제
function cleanTitle(title) {
    const txt = document.createElement('textarea');
    txt.innerHTML = title;
    let t = txt.value;
    t = t.replace(/<[^>]+>/g, '');                          // HTML 태그 제거
    t = t.replace(/\s*[-–—|]\s*[^\-–—|]{1,30}$/, '');   // 언론사 suffix 제거
    t = t.replace(/\s*:\s*[^:]{1,20}$/, '');
    return t.trim();
}

// 제목을 단어 집합으로 분리 (검색 키워드 제외, 1글자 제외)
// 중복 판정에서 항상 제외할 노이즈 단어
const STOP_WORDS = new Set([
    '단독', '속보', '종합', '긴급', 'breaking', '포토', '영상', '사진',
    '오늘', '어제', '이번', '지난', '올해', '최근', '현재', '관련',
    '기자', '뉴스', '보도', '기획', '심층', '기자수첩', '칼럼',
]);

// 제목을 단어 집합으로 분리 (검색 키워드 + 노이즈 단어 제외, 2글자 미만 제외)
function tokenize(title, excludeWords) {
    const cleaned = cleanTitle(title);
    // 한글/영문/숫자가 아닌 문자를 공백으로 치환 후 분리
    // → "인재…안전관리" 가 "인재", "안전관리" 두 토큰으로 분리됨
    return cleaned
        .replace(/[^가-힣a-zA-Z0-9\s]/g, ' ')
        .split(/\s+/)
        .map(w => w.toLowerCase())
        .filter(w => w.length >= 2 && !excludeWords.has(w) && !STOP_WORDS.has(w));
}

function deduplicateItems(items) {
    if (dedupLevel === 'off') return items;

    const rawKeyword = document.getElementById('keyword').value.trim().toLowerCase();
    const excludeWords = new Set(
        rawKeyword.split(/\s+/).map(w => w.replace(/[^\uAC00-\uD7A3a-zA-Z0-9]/g, ''))
    );

    // ── Step 1: 전체 기사 단어 빈도 계산 ──
    const wordFreq   = new Map();
    const itemTokens = items.map(item => {
        const tokens = tokenize(item.title || '', excludeWords);
        tokens.forEach(w => wordFreq.set(w, (wordFreq.get(w) || 0) + 1));
        return tokens;
    });

    const minFreq   = { low: 3, mid: 2, high: 2 }[dedupLevel];
    const sharedMin = { low: 4, mid: 3, high: 2 }[dedupLevel];

    // ── Step 2: 고빈도 단어 집합 추출 ──
    const itemKeySets = itemTokens.map(tokens =>
        new Set(tokens.filter(w => (wordFreq.get(w) || 0) >= minFreq))
    );

    // ── 로그: 전체 단어 빈도 Top 20 (디버그용 — 활성화하려면 주석 해제) ──
    // const freqSorted = [...wordFreq.entries()]
    //     .filter(([,v]) => v >= minFreq)
    //     .sort((a,b) => b[1]-a[1]);
    // console.group(`[중복제거] 설정: ${dedupLevel} / minFreq≥${minFreq} / sharedMin≥${sharedMin} / 기사 ${items.length}건`);
    // console.log('제외 키워드:', [...excludeWords].join(', '));
    // console.log('핵심 키워드 Top20:', freqSorted.slice(0,20).map(([w,c])=>`${w}(${c})`).join(' · '));
    // console.log('');
    // console.log('── 기사별 키워드 & 중복 판정 ──');

    // ── Step 3: 그리디 중복 제거 ──
    const kept     = [];
    const keptSets = [];
    const keptTitles = [];

    items.forEach((item, i) => {
        const keySet  = itemKeySets[i];
        const title   = cleanTitle(item.title || '');
        const keyArr  = [...keySet];

        if (keySet.size === 0) {
            kept.push(item);
            keptSets.push(keySet);
            keptTitles.push(title);
            // console.log(`  ✅ [${i+1}] "${title.slice(0,40)}" → 핵심키워드 없음(유지)`);
            return;
        }

        let isDup       = false;
        let dupWith     = '';
        let sharedWords = [];

        for (let k = 0; k < keptSets.length; k++) {
            const ks = keptSets[k];
            const sw = keyArr.filter(w => ks.has(w));
            if (sw.length >= sharedMin) {
                isDup       = true;
                dupWith     = keptTitles[k];
                sharedWords = sw;
                break;
            }
        }

        if (isDup) {
            // console.log(`  ❌ [${i+1}] "${title.slice(0,40)}"\n       → 중복: 공유어[${sharedWords.join(',')}] ← "${dupWith.slice(0,30)}"`);
        } else {
            kept.push(item);
            keptSets.push(keySet);
            keptTitles.push(title);
            // console.log(`  ✅ [${i+1}] "${title.slice(0,40)}" [${keyArr.join(',')}]`);
        }
    });

    // console.log(`\n결과: ${items.length}건 → ${kept.length}건 (${items.length - kept.length}건 제거)`);
    // console.groupEnd();

    return kept;
}

/* ══════════════════════════════════════════════════════════
   API / RSS 호출
══════════════════════════════════════════════════════════ */
async function fetchSource(src, keyword) {
    if (src.type === 'naver')   return fetchNaver(keyword);
    if (src.type === 'gsearch') return fetchGoogleSearch(keyword);
    return fetchRSS(src, keyword);
}

async function fetchNaver(keyword) {
    const res = await fetch(`${PROXY}/news?query=${encodeURIComponent(keyword)}&display=${maxCount}`);
    if (!res.ok) throw new Error(`네이버 오류: ${res.status}`);
    const data = await res.json();
    return data.items || [];
}

async function fetchGoogleSearch(keyword) {
    // total: 가져올 총 기사 수, API 1회 10건 제한이므로 서버에서 페이지 반복
    const res = await fetch(`${PROXY}/google-search?query=${encodeURIComponent(keyword)}&total=${maxCount}`);
    if (!res.ok) throw new Error(`구글 검색 오류: ${res.status}`);
    const data = await res.json();
    return (data.items || []).map(it => ({
        title:       it.title,
        link:        it.link,
        pubDate:     it.pubDate || '',
        description: it.description || '',
    }));
}

async function fetchRSS(src, keyword) {
    const rssUrl = src.rss(keyword);
    const res    = await fetch(`${PROXY}/rss?url=${encodeURIComponent(rssUrl)}`);
    if (!res.ok) throw new Error(`${src.label} RSS 오류: ${res.status}`);
    const text = await res.text();
    let items = parseRSS(text);

    // filter:true 소스는 키워드로 클라이언트 필터링
    if (src.filter) {
        const kw = keyword.toLowerCase();
        items = items.filter(it =>
            (it.title + ' ' + it.description).toLowerCase().includes(kw)
        );
    }
    return items;
}

function parseRSS(xml) {
    const doc   = new DOMParser().parseFromString(xml, 'text/xml');
    const items = Array.from(doc.querySelectorAll('item'));
    return items.slice(0, maxCount).map(el => {
        const title   = el.querySelector('title')?.textContent || '';
        const link    = el.querySelector('link')?.textContent
                     || el.querySelector('link')?.nextSibling?.nodeValue
                     || '';
        const pubDate = el.querySelector('pubDate')?.textContent || '';
        const desc    = el.querySelector('description')?.textContent || '';
        return { title, link: link.trim(), pubDate, description: desc };
    });
}

/* ── 전체 엑셀 저장 (모든 소스 → 시트 1개) ── */
function exportAllExcel() {
    if (!Object.keys(newsDataStore).length) return;

    const keyword   = document.getElementById('keyword').value.trim();
    const date      = new Date().toISOString().slice(0, 10);
    const decodeHTML = str => {
        const txt = document.createElement('textarea');
        txt.innerHTML = str;
        return txt.value;
    };

    // 모든 소스 결과를 하나의 행 배열로 합치기 (소스명 컬럼 포함)
    const allRows = [];
    for (const [srcId, store] of Object.entries(newsDataStore)) {
        store.items.forEach(item => {
            const title   = decodeHTML((item.title || '').replace(/<[^>]+>/g, '')).trim();
            const pubDate = item.pubDate
                ? new Date(item.pubDate).toLocaleString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })
                : '';
            const link = item.link || '';
            allRows.push({
                '출처':     store.label,
                '기사 제목': title,
                '발행시각': pubDate,
                '기사 링크': link,
            });
        });
    }

    if (!allRows.length) { alert('저장할 결과가 없습니다.'); return; }

    const ws = XLSX.utils.json_to_sheet(allRows);

    // 열 너비
    ws['!cols'] = [
        { wch: 12 },  // 출처
        { wch: 60 },  // 기사 제목
        { wch: 20 },  // 발행시각
        { wch: 80 },  // 기사 링크
    ];

    // 헤더 스타일
    ['A1','B1','C1','D1'].forEach(cell => {
        if (ws[cell]) ws[cell].s = {
            font: { bold: true, color: { rgb: 'FFFFFF' } },
            fill: { fgColor: { rgb: '1E3A5F' } },
            alignment: { horizontal: 'center' }
        };
    });

    // 기사 제목(B열) 하이퍼링크, 기사 링크(D열) 하이퍼링크
    allRows.forEach((row, i) => {
        const rowNum   = i + 2;
        const titleCell = `B${rowNum}`;
        const linkCell  = `D${rowNum}`;
        if (row['기사 링크'] && ws[titleCell]) {
            ws[titleCell].l = { Target: row['기사 링크'] };
            ws[titleCell].s = { font: { color: { rgb: '1A56DB' }, underline: true } };
        }
        if (row['기사 링크'] && ws[linkCell]) {
            ws[linkCell].l = { Target: row['기사 링크'] };
        }
    });

    // 편집 가능 상태로 저장 (bookSST: false, sheetStubs: false)
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '검색결과');
    XLSX.writeFile(wb, `뉴스_${keyword}_${date}.xlsx`, { bookSST: false, cellStyles: true });
}
