<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키워드 뉴스 검색</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ══ 테마 변수 ══════════════════════════════════════════ */
        [data-theme="dark"] {
            --bg:           #111114;
            --surface:      #1c1c20;
            --surface2:     #242428;
            --border:       #32323a;
            --accent:       #d4ff00;
            --accent2:      #38bdf8;
            --text:         #eeeef0;
            --text-sub:     #b0b0bc;
            --muted:        #70707a;
            --card-bg:      #1c1c20;
            --chip-bg:      #28282e;
            --chip-hover:   #33333b;
            --shadow:       rgba(0,0,0,0.5);
            --col-naver:    #00c73c;
            --col-google:   #4285f4;
            --header-border: #2a2a32;
        }
        [data-theme="light"] {
            --bg:           #f2f2ef;
            --surface:      #ffffff;
            --surface2:     #f7f7f4;
            --border:       #ddddd8;
            --accent:       #1d4ed8;
            --accent2:      #0284c7;
            --text:         #111118;
            --text-sub:     #44444e;
            --muted:        #88888e;
            --card-bg:      #ffffff;
            --chip-bg:      #eaeae6;
            --chip-hover:   #dededb;
            --shadow:       rgba(0,0,0,0.06);
            --col-naver:    #00913a;
            --col-google:   #1a56db;
            --header-border: #e0e0d8;
        }

        /* ══ 리셋 & 베이스 ══════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background .25s, color .25s;
        }

        /* ══ 헤더 ═══════════════════════════════════════════════ */
        header {
            position: sticky; top: 0; z-index: 200;
            background: var(--surface);
            border-bottom: 1px solid var(--header-border);
            box-shadow: 0 1px 10px var(--shadow);
            padding: 14px 28px;
            display: flex; align-items: center; gap: 14px;
        }
        .logo-mark {
            width: 32px; height: 32px; background: var(--accent);
            border-radius: 7px; display: flex; align-items: center; justify-content: center;
            font-family: 'Space Mono', monospace; font-weight: 700; font-size: 15px; color: #000;
            flex-shrink: 0;
        }
        header h1 {
            font-family: 'Space Mono', monospace; font-size: 16px;
            font-weight: 700; color: var(--text); flex: 1; letter-spacing: -.3px;
        }
        header h1 span { color: var(--accent); }
        .theme-btn {
            background: var(--chip-bg); border: 1px solid var(--border);
            border-radius: 7px; padding: 6px 14px; cursor: pointer;
            font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
            color: var(--text); transition: background .15s; white-space: nowrap;
        }
        .theme-btn:hover { background: var(--chip-hover); }

        /* ══ 검색 컨트롤 패널 ═══════════════════════════════════ */
        .control-panel {
            max-width: 820px; margin: 36px auto 0; padding: 0 24px;
        }

        /* 소스 선택 탭 */
        .source-tabs {
            display: flex; gap: 8px; margin-bottom: 14px;
        }
        .source-tab {
            display: flex; align-items: center; gap: 7px;
            padding: 8px 18px; border-radius: 8px;
            border: 1.5px solid var(--border);
            background: var(--surface2); cursor: pointer;
            font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
            color: var(--text-sub);
            transition: border-color .15s, background .15s, color .15s;
        }
        .source-tab .dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .source-tab.naver .dot { background: var(--col-naver); }
        .source-tab.google .dot { background: var(--col-google); }
        .source-tab.both .dot {
            background: linear-gradient(135deg, var(--col-naver) 50%, var(--col-google) 50%);
        }
        .source-tab.active {
            border-color: var(--accent); background: var(--surface);
            color: var(--text);
        }
        .source-tab:hover:not(.active) { border-color: var(--muted); color: var(--text); }

        /* 검색창 */
        .search-row {
            display: flex; border: 1.5px solid var(--border);
            border-radius: 10px; overflow: hidden;
            background: var(--surface);
            box-shadow: 0 2px 10px var(--shadow);
            transition: border-color .2s;
        }
        .search-row:focus-within { border-color: var(--accent); }
        .search-row input {
            flex: 1; background: transparent; border: none; outline: none;
            padding: 15px 20px; font-size: 16px; font-weight: 500;
            font-family: 'Noto Sans KR', sans-serif; color: var(--text);
        }
        .search-row input::placeholder { color: var(--muted); font-weight: 400; }
        .search-row button {
            background: var(--accent); border: none; padding: 0 28px; cursor: pointer;
            font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
            color: #000; letter-spacing: .5px; transition: opacity .15s; white-space: nowrap;
        }
        .search-row button:hover { opacity: .85; }
        .search-row button:disabled { opacity: .35; cursor: not-allowed; }

        /* ══ 검색 기록 ══════════════════════════════════════════ */
        .history-wrap {
            max-width: 820px; margin: 16px auto 0; padding: 0 24px;
        }
        .history-header {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
        }
        .history-label {
            font-family: 'Space Mono', monospace; font-size: 10px;
            letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
        }
        .history-actions { display: flex; gap: 8px; }
        .hbtn {
            font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
            background: none; border: 1px solid var(--border); border-radius: 5px;
            padding: 3px 11px; cursor: pointer; color: var(--muted);
            transition: color .15s, border-color .15s, background .15s;
        }
        .hbtn:hover { color: var(--text); border-color: var(--muted); }
        .hbtn.export { color: var(--accent2); border-color: var(--accent2); }
        .hbtn.export:hover { background: rgba(56,189,248,.08); }

        .history-list { display: flex; flex-wrap: wrap; gap: 7px; }
        .h-chip {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--chip-bg); border: 1px solid var(--border);
            border-radius: 20px; padding: 5px 12px 5px 14px;
            font-size: 13px; font-weight: 500; color: var(--text);
            cursor: pointer; transition: background .15s, border-color .15s;
            user-select: none;
        }
        .h-chip:hover { background: var(--chip-hover); border-color: var(--accent); }
        .h-chip .del {
            font-size: 15px; line-height: 1; color: var(--muted);
            transition: color .15s; margin-left: 2px;
        }
        .h-chip .del:hover { color: #f87171; }

        /* ══ 결과 영역 ══════════════════════════════════════════ */
        .results-area {
            margin-top: 28px;
            display: flex;
            gap: 0;
            min-height: 60vh;
        }

        /* 단일 소스일 때 */
        .results-area.single { display: block; }

        /* 분할 패널 */
        .pane {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .pane + .pane {
            border-left: 2px solid var(--border);
        }

        .pane-header {
            position: sticky; top: 61px; z-index: 100;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex; align-items: center; gap: 10px;
        }
        .pane-dot {
            width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
        }
        .pane-dot.naver { background: var(--col-naver); }
        .pane-dot.google { background: var(--col-google); }
        .pane-title {
            font-family: 'Space Mono', monospace; font-size: 12px;
            font-weight: 700; color: var(--text-sub); flex: 1;
        }
        .pane-count {
            font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted);
        }

        .pane-body { padding: 16px; overflow-y: auto; }

        /* ══ 카드 ═══════════════════════════════════════════════ */
        .card-list { display: flex; flex-direction: column; gap: 12px; }

        .news-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px;
            cursor: pointer;
            transition: border-color .18s, box-shadow .18s, transform .18s;
            box-shadow: 0 1px 4px var(--shadow);
        }
        .news-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 18px var(--shadow);
            transform: translateY(-2px);
        }
        .card-source {
            font-family: 'Space Mono', monospace; font-size: 10px;
            letter-spacing: 1.5px; text-transform: uppercase;
            margin-bottom: 7px;
        }
        .card-source.naver { color: var(--col-naver); }
        .card-source.google { color: var(--col-google); }

        .card-title {
            font-size: 15px; font-weight: 700; line-height: 1.55;
            color: var(--text); margin-bottom: 7px;
        }
        .card-desc {
            font-size: 13px; font-weight: 400;
            color: var(--text-sub); line-height: 1.65; margin-bottom: 12px;
        }
        .card-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 10px; border-top: 1px solid var(--border);
        }
        .card-date {
            font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted);
        }
        .card-open {
            font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
            color: var(--accent); text-decoration: none;
            border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
            padding: 3px 10px; border-radius: 4px;
            transition: background .15s;
        }
        .card-open:hover { background: color-mix(in srgb, var(--accent) 10%, transparent); }

        /* ══ 상태 박스 ══════════════════════════════════════════ */
        .state-box { padding: 60px 20px; text-align: center; }
        .state-icon { font-size: 40px; margin-bottom: 14px; }
        .state-title {
            font-family: 'Space Mono', monospace; font-size: 14px;
            color: var(--muted); margin-bottom: 6px;
        }
        .state-sub { font-size: 13px; color: var(--muted); opacity: .6; }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: rgba(248,113,113,.07); border: 1px solid rgba(248,113,113,.22);
            border-radius: 10px; padding: 18px 22px; margin: 16px;
            font-size: 13px; line-height: 1.7; color: #fca5a5;
            font-family: 'Space Mono', monospace;
        }
        .error-msg strong { color: #f87171; display: block; margin-bottom: 6px; }
    </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header>
    <div class="logo-mark">N</div>
    <h1>NEWS <span>SEARCH</span></h1>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀ 라이트</button>
</header>

<!-- ── 컨트롤 패널 ── -->
<div class="control-panel">

    <!-- 소스 탭 -->
    <div class="source-tabs">
        <button class="source-tab naver active" data-src="naver" onclick="selectSource('naver')">
            <span class="dot"></span> 네이버 뉴스
        </button>
        <button class="source-tab google" data-src="google" onclick="selectSource('google')">
            <span class="dot"></span> 구글 뉴스
        </button>
        <button class="source-tab both" data-src="both" onclick="selectSource('both')">
            <span class="dot"></span> 둘 다 보기
        </button>
    </div>

    <!-- 검색창 -->
    <div class="search-row">
        <input type="text" id="keyword" placeholder="검색할 키워드 (예: AI, 삼성전자, 기후변화)">
        <button id="searchBtn" onclick="searchNews()">검색</button>
    </div>
</div>

<!-- ── 검색 기록 ── -->
<div class="history-wrap" id="historyWrap" style="display:none">
    <div class="history-header">
        <span class="history-label">검색 기록</span>
        <div class="history-actions">
            <button class="hbtn export" onclick="exportJSON()">JSON 저장</button>
            <button class="hbtn" onclick="clearHistory()">전체 삭제</button>
        </div>
    </div>
    <div class="history-list" id="historyList"></div>
</div>

<!-- ── 결과 ── -->
<div class="results-area single" id="resultsArea">
    <div class="state-box">
        <div class="state-icon">🔍</div>
        <div class="state-title">키워드를 입력하고 검색하세요</div>
    </div>
</div>

<script>
/* ════════════════════════════════════════════════════════
   설정
════════════════════════════════════════════════════════ */
const PROXY       = "https://jackets-agrees-thought-contributed.trycloudflare.com";
const STORAGE_KEY = "news_keyword_history";

let currentSource = 'naver';
let currentTheme  = localStorage.getItem('news_theme') || 'dark';
applyTheme(currentTheme);

/* ── 테마 ── */
function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('themeBtn').textContent = t === 'dark' ? '☀ 라이트' : '🌙 다크';
    currentTheme = t;
    localStorage.setItem('news_theme', t);
}
function toggleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }

/* ── 소스 선택 ── */
function selectSource(src) {
    currentSource = src;
    document.querySelectorAll('.source-tab').forEach(el => {
        el.classList.toggle('active', el.dataset.src === src);
    });
}

/* ── 검색 기록 ── */
function loadHistory() {
    try {
        const raw = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        // 이전 버전(객체 배열)과 현재 버전(문자열 배열) 모두 처리
        return raw.map(x => {
            if (typeof x === 'string') return x;
            if (x && typeof x === 'object' && x.keyword) return x.keyword;
            return null;
        }).filter(Boolean);
    } catch { return []; }
}
function saveHistory(h) { localStorage.setItem(STORAGE_KEY, JSON.stringify(h)); }

function addToHistory(keyword) {
    let h = loadHistory().filter(x => x !== keyword);
    h.unshift(keyword);
    if (h.length > 30) h = h.slice(0, 30);
    saveHistory(h);
    renderHistory();
}
function removeFromHistory(keyword) {
    saveHistory(loadHistory().filter(x => x !== keyword));
    renderHistory();
}
function clearHistory() {
    if (!confirm("검색 기록을 모두 삭제할까요?")) return;
    localStorage.removeItem(STORAGE_KEY);
    renderHistory();
}
function exportJSON() {
    const h = loadHistory();
    if (!h.length) { alert("저장된 검색 기록이 없습니다."); return; }
    const blob = new Blob([JSON.stringify(h, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `news_keywords_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
}
function renderHistory() {
    const h    = loadHistory();
    const wrap = document.getElementById('historyWrap');
    const list = document.getElementById('historyList');
    if (!h.length) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    list.innerHTML = h.map(kw => {
        const safe = kw.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return `
        <div class="h-chip" onclick="chipClick('${safe}')">
            ${kw}
            <span class="del" onclick="event.stopPropagation();removeFromHistory('${safe}')">×</span>
        </div>`;
    }).join('');
}
function chipClick(kw) {
    document.getElementById('keyword').value = kw;
    searchNews();
}

/* ════════════════════════════════════════════════════════
   검색
════════════════════════════════════════════════════════ */
async function searchNews() {
    const keyword = document.getElementById('keyword').value.trim();
    if (!keyword) { alert("키워드를 입력해주세요!"); return; }

    const btn = document.getElementById('searchBtn');
    btn.disabled = true; btn.textContent = '검색 중…';

    const area = document.getElementById('resultsArea');

    const doNaver  = currentSource === 'naver'  || currentSource === 'both';
    const doGoogle = currentSource === 'google' || currentSource === 'both';
    const isBoth   = currentSource === 'both';

    // 레이아웃 세팅
    area.className = isBoth ? 'results-area' : 'results-area single';

    if (isBoth) {
        area.innerHTML = `
            ${paneHTML('naver', '네이버 뉴스', true)}
            ${paneHTML('google', '구글 뉴스', true)}`;
    } else {
        const src = doNaver ? 'naver' : 'google';
        area.innerHTML = paneHTML(src, src === 'naver' ? '네이버 뉴스' : '구글 뉴스', false);
    }

    // 병렬 fetch
    const tasks = [];
    if (doNaver)  tasks.push(fetchNaver(keyword));
    if (doGoogle) tasks.push(fetchGoogle(keyword));

    const results = await Promise.allSettled(tasks);

    let idx = 0;
    if (doNaver)  renderPane('naver',  results[idx++], keyword);
    if (doGoogle) renderPane('google', results[idx++], keyword);

    addToHistory(keyword);
    btn.disabled = false; btn.textContent = '검색';
}

function paneHTML(src, label, showHeader) {
    const headerHTML = showHeader ? `
        <div class="pane-header">
            <span class="pane-dot ${src}"></span>
            <span class="pane-title">${label}</span>
            <span class="pane-count" id="count-${src}"></span>
        </div>` : '';
    return `
    <div class="pane" id="pane-${src}">
        ${headerHTML}
        <div class="pane-body" id="body-${src}">
            <div class="state-box">
                <div class="spinner"></div>
                <div class="state-title">불러오는 중…</div>
            </div>
        </div>
    </div>`;
}

function renderPane(src, result, keyword) {
    const body  = document.getElementById(`body-${src}`);
    const count = document.getElementById(`count-${src}`);

    if (result.status === 'rejected') {
        body.innerHTML = `<div class="error-msg"><strong>⚠ 오류</strong>${result.reason?.message || '알 수 없는 오류'}</div>`;
        return;
    }

    const items = result.value;
    if (count) count.textContent = `${items.length}건`;

    if (!items.length) {
        body.innerHTML = `<div class="state-box"><div class="state-icon">🔎</div><div class="state-title">결과 없음</div></div>`;
        return;
    }

    body.innerHTML = `<div class="card-list">${items.map(item => cardHTML(item, src)).join('')}</div>`;
}

function cardHTML(item, src) {
    const title = (item.title || '').replace(/<[^>]+>/g, '');
    const desc  = (item.description || '').replace(/<[^>]+>/g, '');
    const link  = item.link || '#';
    const date  = item.pubDate
        ? new Date(item.pubDate).toLocaleString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })
        : '';
    let source = '';
    try { source = new URL(link).hostname.replace('www.', ''); } catch {}

    const safeLink = link.replace(/'/g, "\\'");

    return `
    <div class="news-card" onclick="window.open('${safeLink}','_blank','noopener')">
        ${source ? `<div class="card-source ${src}">${source}</div>` : ''}
        <div class="card-title">${title}</div>
        ${desc ? `<div class="card-desc">${desc}</div>` : ''}
        <div class="card-footer">
            <span class="card-date">${date}</span>
            <a href="${link}" target="_blank" rel="noopener" class="card-open"
               onclick="event.stopPropagation()">보기 →</a>
        </div>
    </div>`;
}

/* ════════════════════════════════════════════════════════
   API 호출
════════════════════════════════════════════════════════ */
async function fetchNaver(keyword) {
    const url = `${PROXY}/news?query=${encodeURIComponent(keyword)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`네이버 서버 오류: ${res.status}`);
    const data = await res.json();
    return data.items || [];
}

async function fetchGoogle(keyword) {
    // Google 뉴스 RSS → 프록시 경유
    const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(keyword)}&hl=ko&gl=KR&ceid=KR:ko`;
    const url    = `${PROXY}/google-news?url=${encodeURIComponent(rssUrl)}`;
    const res    = await fetch(url);
    if (!res.ok) throw new Error(`구글 뉴스 오류: ${res.status}`);
    const text = await res.text();
    return parseGoogleRSS(text);
}

function parseGoogleRSS(xml) {
    const parser = new DOMParser();
    const doc    = parser.parseFromString(xml, 'text/xml');
    const items  = Array.from(doc.querySelectorAll('item'));
    return items.slice(0, 20).map(el => {
        const title    = el.querySelector('title')?.textContent || '';
        const link     = el.querySelector('link')?.textContent || '';
        const pubDate  = el.querySelector('pubDate')?.textContent || '';
        const source   = el.querySelector('source')?.textContent || '';
        const desc     = el.querySelector('description')?.textContent?.replace(/<[^>]+>/g,'') || source;
        return { title, link, pubDate, description: desc };
    });
}

/* ── 초기화 ── */
document.getElementById('keyword').addEventListener('keypress', e => {
    if (e.key === 'Enter') searchNews();
});
renderHistory();
</script>
</body>
</html>
